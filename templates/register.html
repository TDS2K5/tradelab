{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block main %}
    <div class="tl-auth-container">
        <h2 style="text-align: center;">
            <span class="brand-trade" style="color: var(--tl-purple);">Create</span><span class="brand-lab"> Account</span>
        </h2>
        <p class="tl-auth-sub">Start trading on TradeLab</p>

        <div class="tl-card">
            <form action="/register" method="post">
                <div class="tl-form-group">
                    <label class="tl-label" for="reg-username">Username</label>
                    <input autocomplete="off" autofocus class="tl-input" id="reg-username" name="username" placeholder="" type="text">
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="reg-password">Password</label>
                    <input class="tl-input" id="reg-password" name="password" placeholder="" type="password">
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="reg-confirm">Confirm Password</label>
                    <input class="tl-input" id="reg-confirm" name="confirmation" placeholder="" type="password">
                </div>
                <button class="button button--stroke tl-btn-primary tl-btn-full" type="submit"><span class="button__flair"></span><span class="button__label">Register</span></button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 1rem; color: var(--tl-text-muted);">
            Already have an account?<br><br>
            <a href="/login" class="button button--stroke tl-btn-outline" style="width: 100%;"><span class="button__flair"></span><span class="button__label">Log In</span></a>
        </p>
    </div>
{% endblock %}
