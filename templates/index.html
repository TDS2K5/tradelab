{% extends "layout.html" %}

{% block title %}
    Homepage
{% endblock %}

{% block main %}
    <h1 class="mb-3">Portfolio</h1>
   <table class="table table-striped">
        <thead>
            <tr>
                <th class="text-start">Symbol</th>
                <th class="text-end">Shares</th>
                <th class="text-end">Price</th>
                <th class="text-end">TOTAL</th>
            </tr>
        </thead>
       <tbody>
                {% for stock in stocks%}
                <tr>
                    <td class="text-start"><a href="/quote/{{stock.stock}}">{{stock.stock | strip_suffix }}</a></td>
                    <td class="text-end">{{stock.shares}}</td>
                    <td class="text-end">{{stock.price}}</td>
                    <td class="text-end">{{stock.total_price}}</td>
                </tr>
                {% endfor %}

        </tbody>
        <tfoot>
            <tr>
                <td class="border-0 fw-bold text-end" colspan="3">Cash</td>
                <td class="border-0 text-end">{{cash}}</td>
            </tr>
            <tr>
                <td class="border-0 fw-bold text-end" colspan="3">TOTAL</td>
                <td class="border-0 w-bold text-end">{{total}}</td>
            </tr>
        </tfoot>
    </table>

{% endblock %}
