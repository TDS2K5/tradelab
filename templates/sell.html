{% extends "layout.html" %}

{% block title %}Sell{% endblock %}

{% block main %}
    <div class="tl-auth-container">
        <h2 style="text-align: center;">Sell Stocks</h2>
        <p class="tl-auth-sub">Select a stock and number of shares to sell</p>

        <div class="tl-card" style="border-top: 2px solid var(--tl-red);">
            <!-- Inline error banner -->
            <div id="sell-error" style="
                display: none;
                background: rgba(239, 68, 68, 0.12);
                border: 1px solid var(--tl-red, #ef4444);
                border-radius: 8px;
                padding: 12px 16px;
                margin-bottom: 16px;
                color: var(--tl-red, #ef4444);
                font-size: 0.9rem;
                font-weight: 500;
                align-items: center;
                gap: 8px;
                opacity: 0;
                transform: translateY(-8px);
                transition: opacity 0.3s ease, transform 0.3s ease;
            ">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="sell-error-text"></span>
            </div>

            <form id="sell-form">
                <div class="tl-form-group">
                    <label class="tl-label" for="sell-symbol">Stock</label>
                    <select class="tl-select" id="sell-symbol" name="symbol">
                        <option disabled selected>Select a stock</option>
                        {% for symbol in symbols %}
                        <option value="{{ symbol }}">{{ symbol | strip_suffix }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="sell-shares">Shares</label>
                    <input autocomplete="off" class="tl-input" id="sell-shares" min="1" name="shares" placeholder="QTY" type="number">
                </div>
                <button class="button button--stroke tl-btn-danger tl-btn-full" type="submit"><span class="button__flair"></span><span class="button__label">Sell</span></button>
            </form>
        </div>
    </div>


    <script>
document.getElementById('sell-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const errorEl = document.getElementById('sell-error');
    const errorText = document.getElementById('sell-error-text');
    const formData = new FormData(this);

    // Hide any previous error
    errorEl.style.display = 'none';
    errorEl.style.opacity = '0';
    errorEl.style.transform = 'translateY(-8px)';

    fetch('/sell', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json().then(data => ({ ok: response.ok, data })))
    .then(({ ok, data }) => {
        if (!ok && data.error) {
            // Show inline error
            errorText.textContent = data.error;
            errorEl.style.display = 'flex';

            // Trigger reflow then animate in
            requestAnimationFrame(() => {
                errorEl.style.opacity = '1';
                errorEl.style.transform = 'translateY(0)';
            });

            // Auto-dismiss after 4s
            setTimeout(() => {
                errorEl.style.opacity = '0';
                errorEl.style.transform = 'translateY(-8px)';
                setTimeout(() => { errorEl.style.display = 'none'; }, 300);
            }, 4000);
        } else {
            // Success — redirect to portfolio
            window.location.href = '/';
        }
    })
    .catch(err => {
        console.error('Sell request failed:', err);
    });
});
</script>
{% endblock %}
