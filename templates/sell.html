{% extends "layout.html" %}

{% block title %}Sell{% endblock %}

{% block main %}
    <div class="tl-auth-container">
        <h2>Sell Stocks</h2>
        <p class="tl-auth-sub">Select a stock and number of shares to sell</p>

        <div class="tl-card">
            <form action="/sell" method="post">
                <div class="tl-form-group">
                    <label class="tl-label" for="sell-symbol">Stock</label>
                    <select class="tl-select" id="sell-symbol" name="symbol">
                        <option disabled selected>Select a stock</option>
                        {% for symbol in symbols %}
                        <option value="{{ symbol }}">{{ symbol | strip_suffix }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="sell-shares">Shares</label>
                    <input autocomplete="off" class="tl-input" id="sell-shares" min="1" name="shares" placeholder="Number of shares" type="number">
                </div>
                <button class="tl-btn tl-btn-danger tl-btn-full" type="submit"><span>Sell</span><div class="tl-btn-glint"></div></button>
            </form>
        </div>
    </div>
{% endblock %}
