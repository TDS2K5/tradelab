{% extends "layout.html" %}

{% block title %}Sell{% endblock %}

{% block main %}
    <div class="tl-auth-container">
        <h2 style="text-align: center;">Sell Stocks</h2>
        <p class="tl-auth-sub">Select a stock and number of shares to sell</p>

        <div class="tl-card" style="border-top: 2px solid var(--tl-red);">
            <!-- Inline error banner -->
            <div id="sell-error" style="
                display: none;
                background: rgba(239, 68, 68, 0.12);
                border: 1px solid var(--tl-red, #ef4444);
                border-radius: 8px;
                padding: 12px 16px;
                margin-bottom: 16px;
                color: var(--tl-red, #ef4444);
                font-size: 0.9rem;
                font-weight: 500;
                align-items: center;
                gap: 8px;
                opacity: 0;
                transform: translateY(-8px);
                transition: opacity 0.3s ease, transform 0.3s ease;
            ">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="sell-error-text"></span>
            </div>

            <form id="sell-form">
                <div class="tl-form-group">
                    <label class="tl-label" for="sell-symbol">Stock</label>
                    <select class="tl-select" id="sell-symbol" name="symbol">
                        <option disabled selected>Select a stock</option>
                        {% for symbol in symbols %}
                        <option value="{{ symbol }}">{{ symbol | strip_suffix }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="sell-shares" style="display: flex; justify-content: space-between; align-items: center;">
                        Shares
                        <span id="sell-owned-badge" style="
                            display: none;
                            font-family: var(--tl-font-mono);
                            font-size: 0.7rem;
                            font-weight: 600;
                            color: var(--tl-text-muted);
                            background: var(--tl-bg-tertiary, rgba(128,128,128,0.1));
                            padding: 2px 8px;
                            border-radius: 4px;
                        ">You own <span id="sell-owned-count">0</span></span>
                    </label>
                    <input autocomplete="off" class="tl-input" id="sell-shares" min="1" name="shares" placeholder="QTY" type="number" oninput="updateSellTotal()">
                </div>
                <div id="sell-estimate" style="
                    font-family: var(--tl-font-mono);
                    font-size: 0.78rem;
                    color: var(--tl-text-muted);
                    margin-bottom: 0.75rem;
                    padding: 0.4rem 0;
                    border-top: 1px solid var(--tl-border);
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                ">
                    <span>EST. TOTAL: <span id="sell-total" style="color: var(--tl-green); font-weight: 600; transition: color 0.2s ease;">₹0.00</span></span>
                    <span id="sell-price-label" style="opacity: 0.6;"></span>
                </div>
                <button class="button button--stroke tl-btn-danger tl-btn-full" type="submit"><span class="button__flair"></span><span class="button__label">Sell</span></button>
            </form>
        </div>
    </div>


    <script>
// Track current stock state
let currentSellPrice = 0;
let ownedShares = 0;

// Fetch price + owned shares when user selects a stock
document.getElementById('sell-symbol').addEventListener('change', function() {
    const symbol = this.value;
    const priceLabel = document.getElementById('sell-price-label');
    const totalEl = document.getElementById('sell-total');
    const ownedBadge = document.getElementById('sell-owned-badge');
    const ownedCount = document.getElementById('sell-owned-count');
    const sharesInput = document.getElementById('sell-shares');

    // Reset while loading
    currentSellPrice = 0;
    ownedShares = 0;
    totalEl.textContent = '₹0.00';
    totalEl.style.color = 'var(--tl-green)';
    priceLabel.textContent = 'Loading...';
    ownedBadge.style.display = 'none';
    sharesInput.removeAttribute('max');

    fetch('/api/price/' + encodeURIComponent(symbol))
        .then(r => r.json())
        .then(data => {
            if (data.price) {
                currentSellPrice = data.price;
                ownedShares = data.owned_shares || 0;

                priceLabel.textContent = '@ ₹' + data.price.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

                // Show owned shares badge
                ownedCount.textContent = ownedShares;
                ownedBadge.style.display = 'inline-block';

                // Set max on the input
                sharesInput.setAttribute('max', ownedShares);

                updateSellTotal();
            } else {
                priceLabel.textContent = 'Price unavailable';
            }
        })
        .catch(() => {
            priceLabel.textContent = 'Error';
        });
});

// Update est. total + validate shares against owned
function updateSellTotal() {
    const sharesInput = document.getElementById('sell-shares');
    const shares = parseInt(sharesInput.value) || 0;
    const totalEl = document.getElementById('sell-total');
    const errorEl = document.getElementById('sell-error');
    const errorText = document.getElementById('sell-error-text');

    const total = (shares * currentSellPrice).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    totalEl.textContent = '₹' + total;

    // Client-side validation: shares exceeds owned
    if (ownedShares > 0 && shares > ownedShares) {
        totalEl.style.color = 'var(--tl-red)';
        sharesInput.style.borderColor = 'var(--tl-red)';

        // Show inline error
        errorText.textContent = 'You only own ' + ownedShares + ' share' + (ownedShares !== 1 ? 's' : '') + ' of this stock.';
        errorEl.style.display = 'flex';
        requestAnimationFrame(() => {
            errorEl.style.opacity = '1';
            errorEl.style.transform = 'translateY(0)';
        });
    } else {
        totalEl.style.color = 'var(--tl-green)';
        sharesInput.style.borderColor = '';

        // Hide error if it was showing from input validation
        errorEl.style.opacity = '0';
        errorEl.style.transform = 'translateY(-8px)';
        setTimeout(() => { errorEl.style.display = 'none'; }, 300);
    }
}

// Form submission handler
document.getElementById('sell-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const errorEl = document.getElementById('sell-error');
    const errorText = document.getElementById('sell-error-text');
    const shares = parseInt(document.getElementById('sell-shares').value) || 0;

    // Client-side block: don't even send request if over limit
    if (ownedShares > 0 && shares > ownedShares) {
        errorText.textContent = 'You only own ' + ownedShares + ' share' + (ownedShares !== 1 ? 's' : '') + ' of this stock.';
        errorEl.style.display = 'flex';
        requestAnimationFrame(() => {
            errorEl.style.opacity = '1';
            errorEl.style.transform = 'translateY(0)';
        });
        return;
    }

    const formData = new FormData(this);

    // Hide any previous error
    errorEl.style.display = 'none';
    errorEl.style.opacity = '0';
    errorEl.style.transform = 'translateY(-8px)';

    fetch('/sell', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json().then(data => ({ ok: response.ok, data })))
    .then(({ ok, data }) => {
        if (!ok && data.error) {
            // Show inline error
            errorText.textContent = data.error;
            errorEl.style.display = 'flex';

            requestAnimationFrame(() => {
                errorEl.style.opacity = '1';
                errorEl.style.transform = 'translateY(0)';
            });

            // Auto-dismiss after 4s
            setTimeout(() => {
                errorEl.style.opacity = '0';
                errorEl.style.transform = 'translateY(-8px)';
                setTimeout(() => { errorEl.style.display = 'none'; }, 300);
            }, 4000);
        } else {
            // Success — redirect to portfolio
            window.location.href = '/';
        }
    })
    .catch(err => {
        console.error('Sell request failed:', err);
    });
});
</script>
{% endblock %}
