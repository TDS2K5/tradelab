{% extends "layout.html" %}

{% block title %}Error{% endblock %}

{% block main %}
    <div style="padding: 4rem 0; text-align: center;">
        <div class="tl-error-code" style="color: var(--tl-red);">{{ top }}</div>
        <p class="tl-error-msg">{{ bottom }}</p>
        <button onclick="history.back()" class="button button--stroke tl-btn-outline" style="margin-top: 1.5rem;"><span class="button__flair"></span><span class="button__label"> Go Back</span></button>
    </div>
{% endblock %}
