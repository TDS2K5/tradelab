{% extends "layout.html" %}

{% block title %}Log In{% endblock %}

{% block main %}
    <div class="tl-auth-container">
        <h2 style="text-align: center;">
            <span class="brand-trade" style="color: var(--tl-purple);">Trade</span><span class="brand-lab">Lab</span>
        </h2>
        <br>
        <p class="tl-auth-sub">Sign in</p>

        <div class="tl-card">
            <form action="/login" method="post">
                <div class="tl-form-group">
                    <label class="tl-label" for="login-username">Username</label>
                    <input autocomplete="off" autofocus class="tl-input" id="login-username" name="username" placeholder="" type="text">
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="login-password">Password</label>
                    <input class="tl-input" id="login-password" name="password" placeholder="" type="password">
                </div>
                <br>
                <button class="button button--stroke tl-btn-primary tl-btn-full" type="submit"><span class="button__flair"></span><span class="button__label">Log In</span></button>
                <br><br>
            </form>
        </div>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 1rem; color: var(--tl-text-muted);">
            Don't have an account?<br><br>
            <a href="/register" class="button button--stroke tl-btn-outline" style="width: 100%;"><span class="button__flair"></span><span class="button__label">Register Now</span></a>
        </p>
    </div>
{% endblock %}
