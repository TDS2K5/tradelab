{% extends "layout.html" %}

{% block title %}Log In{% endblock %}

{% block main %}
    <div class="tl-auth-container">
        <h2 style="text-align: center;">
            <span class="brand-trade" style="color: var(--tl-purple);">Trade</span><span class="brand-lab">Lab</span>
        </h2>
        <br>
        <p class="tl-auth-sub">Sign in</p>

        <div class="tl-card">
            <form action="/login" method="post">
                <div class="tl-form-group">
                    <label class="tl-label" for="login-username">Username</label>
                    <input autocomplete="off" autofocus class="tl-input" id="login-username" name="username" placeholder="" type="text">
                </div>
                <div class="tl-form-group">
                    <label class="tl-label" for="login-password">Password</label>
                    <div class="tl-password-wrapper">
                        <input class="tl-input" id="login-password" name="password" placeholder="" type="password">
                        <button type="button" class="tl-password-toggle" aria-label="Show password" data-target="login-password">
                            <svg class="tl-eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
                            <svg class="tl-eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                        </button>
                    </div>
                </div>
                <br>
                <button class="button button--stroke tl-btn-primary tl-btn-full" type="submit"><span class="button__flair"></span><span class="button__label">Log In</span></button>
                <br><br>
            </form>

            <div class="tl-auth-divider">
                <span>OR</span>
            </div>

            <button class="tl-google-btn" id="google-signin-btn" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </button>
        </div>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 1rem; color: var(--tl-text-muted);">
            Don't have an account?<br><br>
            <a href="/register" class="button button--stroke tl-btn-outline" style="width: 100%;"><span class="button__flair"></span><span class="button__label">Register Now</span></a>
        </p>
    </div>
{% endblock %}
