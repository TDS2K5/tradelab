{% extends "layout.html" %}

{% block title %}
    Search stocks
{% endblock %}

{% block main %}
    <h1 class="mb-3">Search Stocks</h1>
    <form action="/search" method="post">
        <div class="mb-3">
            <input autocomplete="on" autofocus class="form-control mx-auto w-auto" name="query" placeholder="Search Query" type="text">
        </div>
        <button class="btn btn-primary" type="submit">Search</button>
    </form>
{% endblock %}
